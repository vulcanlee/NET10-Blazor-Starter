name: .NET CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
    branches:
      - main

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore src/MyProject/MyProject.slnx

      - name: Build
        run: dotnet build src/MyProject/MyProject.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test src/MyProject/MyProject.slnx --configuration Release --no-build --verbosity normal

      - name: Documentation encoding check
        shell: pwsh
        run: ./scripts/Test-DocsEncoding.ps1

      - name: Vulnerability scan
        run: dotnet list src/MyProject/MyProject.slnx package --vulnerable --include-transitive
